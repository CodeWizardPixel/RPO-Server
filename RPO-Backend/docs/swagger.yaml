basePath: /api/v1
definitions:
  handlers.AuthorizationRequest:
    properties:
      amount:
        type: number
      card_number:
        type: string
      operation:
        type: string
      terminal_serial_number:
        type: string
    type: object
  handlers.CardBalanceRequest:
