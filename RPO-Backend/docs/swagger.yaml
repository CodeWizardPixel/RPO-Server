info:
  contact: {}
  title: Lab2 REST API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with login and password and returns a JWT
        access token.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT and user id
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Invalid request body or missing fields
          schema:
            type: string
        "401":
          description: Invalid login or password
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
      summary: Issue JWT
      tags:
      - auth
  /auth/validate:
    post:
      description: Verifies the Bearer token sent in the Authorization header.
      parameters:
      - default: Bearer
        description: Bearer JWT
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token is valid
          schema:
            $ref: '#/definitions/handlers.ValidateTokenResponse'
        "400":
          description: Missing or malformed Authorization header
          schema:
            type: string
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/handlers.ValidateTokenResponse'
        "405":
          description: Method not allowed
          schema:
            type: string
      summary: Validate JWT
      tags:
      - auth
  /cards/all:
    get:
