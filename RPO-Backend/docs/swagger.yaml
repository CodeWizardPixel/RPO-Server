      is_blocked:
        type: integer
      key_id:
        type: integer
      owner_name:
        type: string
    type: object
  handlers.KeyRequest:
    properties:
      id:
        type: integer
      value:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  handlers.LoginResponse:
    properties:
      message:
        type: string
      token:
        type: string
      user_id:
        type: integer
    type: object
  handlers.TerminalRequest:
    properties:
      address:
        type: string
      id:
        type: integer
      name:
        type: string
      serial_number:
        type: string
    type: object
  handlers.TransactionRequest:
    properties:
      amount:
        type: number
      card_id:
        type: integer
      id:
        type: integer
      terminal_id:
        type: integer
    type: object
  handlers.UserRequest:
    properties:
      id:
        type: integer
      is_admin:
        type: integer
      login:
        type: string
      name:
        type: string
      password_hash:
        type: string
    type: object
  handlers.ValidateTokenResponse:
    properties:
      message:
        type: string
      valid:
        type: boolean
    type: object
  repository.Card:
    properties:
      balance:
        type: number
      cardNumber:
        type: string
      id:
        type: integer
      isBlocked:
        type: integer
      keyID:
        type: integer
      ownerName:
        type: string
    type: object
  repository.Key:
    properties:
      id:
        type: integer
      value:
        type: string
    type: object
  repository.Terminal:
    properties:
      address:
        type: string
      id:
        type: integer
      name:
        type: string
      serialNumber:
        type: string
    type: object
  repository.Transaction:
    properties:
      amount:
        type: number
      cardID:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      operation:
        type: string
      terminalID:
        type: integer
    type: object
  repository.User:
    properties:
      id:
        type: integer
      isAdmin:
        type: integer
      login:
        type: string
      name:
        type: string
      passwordHash:
        type: string
    type: object
  service.AuthorizationResponse:
    properties:
      authorized:
        type: boolean
      balance:
        type: number
      card_number:
        type: string
      message:
        type: string
      operation:
        type: string
    type: object
